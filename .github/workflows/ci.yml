name: CI Pipeline

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  backend-checks:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r taskflow/backend/requirements.txt

      - name: Verify Python Compilation
        run: |
          python -m py_compile taskflow/backend/database.py taskflow/backend/models.py taskflow/backend/schemas.py taskflow/backend/auth.py taskflow/backend/main.py

  frontend-checks:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./taskflow
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 9

      - name: Install Dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Run Lint
        run: pnpm run lint

      - name: Run Build
        run: pnpm run build

